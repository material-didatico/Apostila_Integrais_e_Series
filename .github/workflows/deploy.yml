
name: Build LaTeX, Generate MkDocs HTML and Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build LaTeX and generate Markdown
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LaTeX and tools
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-full make pandoc

      - name: Run Makefile (generate Markdown)
        run: make publish

      - name: Upload Markdown artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-markdown
          path: _docs_md

  mkdocs:
    name: Build HTML with MkDocs
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Markdown artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-markdown
          path: docs

      - name: Install MkDocs
        run: |
          python3 -m pip install --upgrade pip
          pip install mkdocs mkdocs-material

      - name: Build site with MkDocs
        run: mkdocs build --clean

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: mkdocs
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
